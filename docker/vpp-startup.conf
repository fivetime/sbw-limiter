unix {
  nodaemon
  cli-listen /run/vpp/cli.sock
  gid vpp
}
api-segment { gid vpp }
socksvr { socket-name /run/vpp/api.sock }
plugins {
  plugin default { enable }
  plugin dpdk_plugin.so { disable }
}
# linux_cp must be loaded (it is, via `plugin default`) — the agent's required
# lcp_itf_pair_add_del_v3 binapi message only exists with that plugin.
linux-cp { default netns dataplane lcp-sync }
