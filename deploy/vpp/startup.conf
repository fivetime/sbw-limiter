## VPP startup config for functional testing in containers (no DPDK, 4K pages).
## DESIGN.md §5. Real deployments add hugepages + DPDK/native NICs; this profile
## runs VPP on a plain container with af_packet over veth.

unix {
  nodaemon
  log /var/log/vpp/vpp.log
  full-coredump
  cli-listen /run/vpp/cli.sock
  ## binary API socket the edge-agent (T-401) connects to:
  gid vpp
}

api-trace {
  on
}

## Bind the binary API to a unix socket (govpp socketclient target).
socksvr {
  socket-name /run/vpp/api.sock
}

## Plain 4K pages — no hugepages required for functional tests.
memory {
  main-heap-size 512M
  main-heap-page-size 4k
}

buffers {
  buffers-per-numa 16384
  default data-size 2048
  page-size 4k
}

## No DPDK plugin; interfaces are created via `create host-interface`
## (af_packet) over the veths containerlab/docker provide.
plugins {
  plugin dpdk_plugin.so { disable }
  ## TWO plugins are needed: linux_cp mirrors INTERFACES (lcp pairs, taps,
  ## addresses); linux_nl is the netlink LISTENER that mirrors the Linux RIB
  ## into the VPP FIB. linux_nl is disabled by default — without it routes do
  ## NOT mirror (only interfaces do). This is the §5.1 route-mirror requirement.
  plugin linux_cp_plugin.so { enable }
  plugin linux_nl_plugin.so { enable }
  plugin abf_plugin.so { enable }
  plugin acl_plugin.so { enable }
  plugin policer_plugin.so { enable }
  plugin urpf_plugin.so { enable }
}

## linux-cp: BIRD runs in this netns; lcp pairs mirror VPP interfaces to it,
## and the netlink listener mirrors the Linux RIB into the VPP FIB (§5.1).
linux-cp {
  default netns dataplane
  lcp-sync
}

## netlink tuning (§1.1-3); valid only once linux_nl_plugin is loaded. Defaults
## (128MB / 2048 / 50ms) suit the full-table case; tune per edge if needed.
linux-nl {
  nl-rx-buffer-size 134217728
}

cpu {
  ## single main thread for functional tests; no workers (avoids the
  ## multi-worker policer split — exact accounting, §5.2). Scale up for perf.
  main-core 0
}
