# CI (T-202): lint, vet, race tests, build, ARM64 artifacts.
# Logic lives in scripts/ci.sh — keep this file a thin runner so local
# `make ci` and CI stay identical.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # go.mod has `replace github.com/fivetime/sbw-contract => ../sbw-contract`,
      # a sibling-checkout convenience for local dev. CI checks out only this repo,
      # so vet/lint/test/build can't resolve the replace until the sibling exists.
      # Clone it next to the workspace (same pattern as docker/Dockerfile). Private
      # repo → needs GH_PAT with read access to sbw-contract; github.token is scoped
      # to this repo only and cannot read it.
      - name: Checkout sbw-contract (local-replace target)
        run: |
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/fivetime/sbw-contract.git" \
            ../sbw-contract
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}

      - name: Install golangci-lint (pinned)
        run: |
          # v2.4.0 is built with go1.25 — older golangci-lint (e.g. v2.1.6, go1.24)
          # refuses a project whose go.mod targets a newer Go than its own build.
          curl -fsSL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.4.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run CI pipeline
        run: bash scripts/ci.sh
        env:
          CI: "true"

      - name: Upload ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edge-binaries-arm64
          path: dist/*-linux-arm64
          retention-days: 14
